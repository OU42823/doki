<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>銅鐸AR展示サイト</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #f8f9fa; }
        header { padding: 20px; text-align: center; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { margin: 0; font-size: 1.3rem; }
        .container { position: relative; width: 100%; height: 60vh; background: #eee; }
        model-viewer { width: 100%; height: 100%; background-color: #eee; }
        #ar-button {
            background-color: #2c3e50; color: white; border-radius: 30px; border: none;
            padding: 12px 24px; font-weight: bold; position: absolute; bottom: 20px;
            left: 50%; transform: translateX(-50%); z-index: 10;
        }
        .info { padding: 20px; background: white; }
    </style>
</head>
<body>

    <header><h1>銅鐸 3Dアーカイブ</h1></header>

    <div class="container">
        <model-viewer 
            src="{{ url_for('static', filename='doutaku2.usdz') }}" 
            ios-src="{{ url_for('static', filename='doutaku2.usdz') }}"
            ar ar-modes="webxr quick-look scene-viewer" ar-placement="floor"
            camera-controls 
            interaction-prompt="none"

            /* --- 回転の制限を完全に撤廃する魔法の4行 --- */
            min-polar-angle="0deg" 
            max-polar-angle="180deg"
            min-azimuth-angle="-infinity"
            max-azimuth-angle="infinity"
            
            /* --- 反応を速くし、もさもさ感を消す --- */
            interpolation-decay="10" 
            orbit-sensitivity="1.8"
            /* -------------------------------------- */

            touch-action="none"
            shadow-intensity="1">
            
            <button slot="ar-button" id="ar-button">✨ 地面に配置する</button>
        </model-viewer>
    </div>

    <div class="info">
        <h2>操作ガイド</h2>
        <p>
            ・<b>全方向回転</b>：指1本で上下左右、裏側まで回せます。<br>
            ・<b>ズーム</b>：指2本でピンチ操作。
        </p>
    </div>

</body>
</html>
