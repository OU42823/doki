<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>銅鐸AR展示サイト</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #f8f9fa; }
        header { padding: 20px; text-align: center; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { margin: 0; font-size: 1.3rem; }
        
        .container { position: relative; width: 100%; height: 60vh; background: #eee; }
        model-viewer { width: 100%; height: 100%; background-color: #eee; }
        
        /* 📱 「地面に配置する」ボタン */
        #ar-button {
            background-color: #2c3e50; color: white; border-radius: 30px; border: none;
            padding: 12px 24px; font-weight: bold; position: absolute; bottom: 20px;
            left: 50%; transform: translateX(-50%); z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* 🔊 ARカメラの中にも出現する「音のボタン」 */
        #play-btn {
            background-color: #e74c3c; color: white; border-radius: 30px; border: none;
            padding: 12px 24px; font-weight: bold; position: absolute; 
            bottom: 20px; right: 20px; z-index: 9999; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        /* ❌ ARカメラを閉じるボタン（AR中だけ左上に出現） */
        #exit-btn {
            background-color: rgba(0,0,0,0.6); color: white; border-radius: 20px; border: none;
            padding: 8px 16px; font-size: 14px; position: absolute;
            top: 20px; left: 20px; z-index: 9999; display: none;
        }
        
        .info { padding: 20px; background: white; }
    </style>
</head>
<body>

    <header><h1>銅鐸 3Dアーカイブ</h1></header>

    <audio id="doutaku-sound" src="{{ url_for('static', filename='sound.mp3') }}" loop></audio>

    <div class="container">
        <model-viewer 
            src="{{ url_for('static', filename='doutaku2.usdz') }}" 
            ios-src="{{ url_for('static', filename='doutaku2.usdz') }}"
            ar ar-modes="webxr scene-viewer quick-look" ar-placement="floor"
            camera-controls interaction-prompt="none"
            min-polar-angle="0deg" max-polar-angle="180deg"
            min-azimuth-angle="-infinity" max-azimuth-angle="infinity"
            interpolation-decay="10" orbit-sensitivity="1.8"
            touch-action="none" shadow-intensity="1">
            
            <button slot="ar-button" id="ar-button">✨ 地面に配置する</button>
            
            <button slot="ar-failure" id="exit-btn" onclick="exitAR()">✕ 閉じる</button>
            
        </model-viewer>

        <button id="play-btn" onclick="toggleAudio()">🎵 音を鳴らす</button>
    </div>

    <div class="info">
        <h2>操作ガイド</h2>
        <p>
            ・<b>全方向回転</b>：指1本で上下左右、裏側まで回せます。<br>
            ・<b>AR体験</b>：地面に配置した後も、画面の右下のボタンで音を鳴らせます。
        </p>
    </div>

    <script>
        const audio = document.getElementById('doutaku-sound');
        const btn = document.getElementById('play-btn');
        const exitBtn = document.getElementById('exit-btn');
        const modelViewer = document.querySelector('model-viewer');

        // 音のオンオフ
        function toggleAudio() {
            if (audio.paused) {
                audio.play();
                btn.innerText = "🔊 音を止める";
                btn.style.backgroundColor = "#7f8c8d";
            } else {
                audio.pause();
                btn.innerText = "🎵 音を鳴らす";
                btn.style.backgroundColor = "#e74c3c";
            }
        }

        // ARモードに入ったとき・出たときのボタン制御（Android/WebXR用）
        modelViewer.addEventListener('ar-status', (event) => {
            if (event.detail.status === 'object-placed' || event.detail.status === 'session-started') {
                // ARカメラが起動したら「閉じる」ボタンを出す
                exitBtn.style.display = 'block';
            } else if (event.detail.status === 'not-presenting') {
                // ARが終わったら「閉じる」ボタンを隠す
                exitBtn.style.display = 'none';
            }
        });

        // ARを強制終了する関数
        function exitAR() {
            if (modelViewer.activatedAR) {
                document.exitPictureInPicture(); 
            }
        }
    </script>

</body>
</html>
