<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>銅鐸AR - 展示</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        /* レイアウトの設定 */
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f5f5f5; color: #333; }
        
        header { padding: 20px; text-align: center; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { margin: 0; font-size: 1.5rem; color: #4a4a4a; }
        
        /* 3Dモデル表示エリア */
        .container { position: relative; width: 100%; height: 70vh; background: #eee; }
        model-viewer { width: 100%; height: 100%; --poster-color: transparent; }

        /* ARボタン（地面認識・全方向回転対応） */
        #ar-button {
            background-color: #4a90e2;
            color: white;
            border-radius: 50px;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* 下部の説明文エリア */
        .description { padding: 20px; line-height: 1.6; }
    </style>
</head>
<body>

    <header>
        <h1>古代の響き：銅鐸AR展示</h1>
    </header>

    <div class="container">
        <model-viewer 
            src="{{ url_for('static', filename='doutaku2.usdz') }}" 
            ios-src="{{ url_for('static', filename='doutaku2.usdz') }}"
            ar 
            ar-modes="webxr quick-look scene-viewer" 
            ar-placement="floor"
            camera-controls 
            interaction-prompt="none"
            enable-pan
            min-camera-orbit="auto auto auto"
            max-camera-orbit="auto auto auto"
            touch-action="none"
            shadow-intensity="1"
            auto-rotate>
            
            <button slot="ar-button" id="ar-button">
                📱 カメラで地面に置く
            </button>
        </model-viewer>
    </div>

    <div class="description">
        <h3>解説</h3>
        <p>この銅鐸は、指で自由に回転させて裏側まで観察することができます。ARボタンを押すと、あなたの部屋に実物大の銅鐸を出現させることができます。</p>
    </div>

</body>
</html>
