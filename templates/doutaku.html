<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>銅鐸AR展示サイト</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #f8f9fa; }
        header { padding: 20px; text-align: center; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { margin: 0; font-size: 1.3rem; }
        
        .container { position: relative; width: 100%; height: 60vh; background: #eee; }
        model-viewer { width: 100%; height: 100%; background-color: #eee; }
        
        /* 📱 「地面に配置する」ボタン */
        #ar-button {
            background-color: #2c3e50; color: white; border-radius: 30px; border: none;
            padding: 12px 24px; font-weight: bold; position: absolute; bottom: 20px;
            left: 5%; z-index: 99999; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        /* 🔊 ARカメラの映像の上にも強制的に浮き出させる「音のボタン」 */
        #play-btn {
            background-color: #e74c3c; color: white; border-radius: 30px; border: none;
            padding: 12px 24px; font-weight: bold; position: absolute; 
            bottom: 20px; right: 5%; z-index: 99999; /* 👈 最大値にしてカメラ映像より前に出す */
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        
        .info { padding: 20px; background: white; }
    </style>
</head>
<body>

    <header><h1>銅鐸 3Dアーカイブ</h1></header>

    <audio id="doutaku-sound" src="{{ url_for('static', filename='doutakuoto.mp3') }}" loop></audio>

    <div class="container">
        <model-viewer 
            src="{{ url_for('static', filename='doutaku2.usdz') }}" 
            ios-src="{{ url_for('static', filename='doutaku2.usdz') }}"
            ar ar-modes="webxr" ar-placement="floor"
            camera-controls interaction-prompt="none"
            min-polar-angle="0deg" max-polar-angle="180deg"
            min-azimuth-angle="-infinity" max-azimuth-angle="infinity"
            interpolation-decay="10" orbit-sensitivity="1.8"
            touch-action="none" shadow-intensity="1">
            
            <button slot="ar-button" id="ar-button">✨ 地面に配置する</button>
            
        </model-viewer>

        <button id="play-btn" onclick="toggleAudio()">🎵 音を鳴らす</button>
    </div>

    <div class="info">
        <h2>操作ガイド</h2>
        <p>
            ・<b>全方向回転</b>：指1本で上下左右、裏側までスムーズに回せます。<br>
            ・<b>AR体験</b>：カメラ起動中も、右下のボタンから音のON/OFFが可能です。（※AndroidのWebXR対応機種のみ）
        </p>
    </div>

    <script>
        const audio = document.getElementById('doutaku-sound');
        const btn = document.getElementById('play-btn');

        function toggleAudio() {
            if (audio.paused) {
                audio.play().catch(err => console.log("再生エラー:", err));
                btn.innerText = "🔊 音を止める";
                btn.style.backgroundColor = "#7f8c8d";
            } else {
                audio.pause();
                btn.innerText = "🎵 音を鳴らす";
                btn.style.backgroundColor = "#e74c3c";
            }
        }
    </script>

</body>
</html>
