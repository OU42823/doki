<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>銅鐸AR</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #f0f0f0; }
        model-viewer { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <model-viewer 
        src="{{ url_for('static', filename='doutaku2.usdz') }}" 
        ios-src="{{ url_for('static', filename='doutaku2.usdz') }}"
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        auto-rotate>
        <button slot="ar-button" style="background-color: white; border-radius: 4px; border: none; position: absolute; bottom: 16px; right: 16px; padding: 12px;">
            👋 カメラで見る
        </button>
    </model-viewer>
</body>
</html>
