<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White AR App - Center Button</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        :root { 
            --accent-color: #007bff; 
            --ui-bg: rgba(255, 255, 255, 0.9);
            --text-color: #333333;
        }
        
        body { 
            margin: 0; 
            background-color: #ffffff; 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }

        model-viewer {
            width: 100%;
            height: 100vh;
            background-color: #ffffff;
            --poster-color: #ffffff;
        }

        /* 右上：設定メニュー（変更なし） */
        #menu-container { position: absolute; top: 20px; right: 20px; z-index: 100; display: flex; flex-direction: column; align-items: flex-end; }
        
        #menu-toggle { 
            background: var(--ui-bg); 
            backdrop-filter: blur(10px); 
            border: 1px solid #ccc; 
            color: var(--text-color); 
            padding: 12px; 
            border-radius: 12px; 
            font-size: 20px; 
            cursor: pointer;
        }

        #settings-drawer { 
            background: var(--ui-bg); 
            backdrop-filter: blur(15px); 
            border-radius: 15px; 
            padding: 20px; 
            margin-top: 10px; 
            width: 250px; 
            display: none; 
            color: var(--text-color); 
            border: 1px solid #eee;
        }

        /* 【修正点】下部中央：AR起動ボタン */
        #ar-launch-container { 
            position: absolute; 
            bottom: 40px; /* 下からの距離 */
            left: 50%;
            transform: translateX(-50%); /* 中央寄せ */
            z-index: 100; 
        }
        
        .action-button { 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            padding: 16px 32px; /* 少し大きめに */
            border-radius: 50px; 
            font-weight: bold; 
            font-size: 16px; 
            box-shadow: 0 4px 20px rgba(0,123,255,0.4); 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            cursor: pointer;
            white-space: nowrap;
        }
        
        .play-btn { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 5px; width: 100%; margin-top: 5px; cursor: pointer; }
        .instruction { 
            position: absolute; 
            top: 80px; /* 説明文は上の方に移動してボタンとの重なりを回避 */
            width: 100%; 
            text-align: center; 
            color: #888; 
            font-size: 12px; 
            pointer-events: none; 
        }
    </style>
</head>
<body>

    <model-viewer 
        id="main-viewer"
        src="{{ url_for('static', filename='model.glb') }}" 
        ios-src="{{ url_for('static', filename='model.usdz') }}"
        ar 
        ar-modes="quick-look scene-viewer webxr" 
        camera-controls 
        ar-placement="floor"
        touch-action="pan-y"
        shadow-intensity="1"
        auto-rotate>

        <div id="menu-container">
            <button id="menu-toggle" onclick="toggleDrawer()">⚙️</button>
            <div id="settings-drawer">
                <div style="margin-bottom:10px; font-weight:bold;">Settings</div>
                <button class="play-btn" onclick="playSound()">🔊 Sound Test</button>
                <button class="play-btn" style="background:#888; margin-top:10px;" onclick="toggleDrawer()">Close</button>
            </div>
        </div>

        <div class="instruction">ピンチで拡大 / ドラッグで操作</div>

        <!-- ボタンを中央に配置 -->
        <div id="ar-launch-container">
            <button slot="ar-button" class="action-button">
                📷 ARカメラを起動
            </button>
        </div>

    </model-viewer>

    <audio id="ar-audio" src="{{ url_for('static', filename='sound.mp3') }}" preload="auto"></audio>

    <script>
        const modelViewer = document.querySelector("#main-viewer");
        const audio = document.getElementById("ar-audio");
        const drawer = document.getElementById("settings-drawer");

        function toggleDrawer() {
            drawer.style.display = (drawer.style.display === "block") ? "none" : "block";
        }

        function playSound() {
            audio.currentTime = 0;
            audio.play().catch(e => alert("Please tap the screen first."));
        }

        modelViewer.addEventListener('click', (e) => {
            if(e.target.tagName !== 'BUTTON' && drawer.style.display !== "block") {
                playSound();
            }
        });
    </script>
</body>
</html>
